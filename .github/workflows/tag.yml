name: Auto Tag

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Version level for update'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          latest_tag=$(git tag --sort=-v:refname | head -n1)

          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          echo "latest=$latest_tag" >> $GITHUB_ENV

      - name: Bump version
        id: bump
        run: |
          level="${{ github.event.inputs.level }}"
          latest=$latest
          IFS='.' read -r major minor patch <<<"${latest#v}"
          if [ "$level" = "patch" ]; then
            patch=$((patch + 1))
          elif [ "$level" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          elif [ "$level" = "major" ]; then
            major=$((major + 1))
            minor=0
            patch=0
          fi
          new_tag="v$major.$minor.$patch"
          echo "new_tag=$new_tag" >> $GITHUB_ENV

      - name: Create new tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $new_tag
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $new_tag

      - name: Output new tag
        run: echo "Created tag $new_tag"